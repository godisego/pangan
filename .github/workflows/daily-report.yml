name: Daily Report Trigger

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          DAILY_REPORT_URL: ${{ secrets.DAILY_REPORT_URL }}
        run: |
          if [ -z "$DAILY_REPORT_URL" ]; then
            echo "Missing DAILY_REPORT_URL secret"
            exit 1
          fi

      - name: Trigger backend daily report
        env:
          DAILY_REPORT_URL: ${{ secrets.DAILY_REPORT_URL }}
          DAILY_REPORT_TRIGGER_SECRET: ${{ secrets.DAILY_REPORT_TRIGGER_SECRET }}
        run: |
          if [ -n "$DAILY_REPORT_TRIGGER_SECRET" ]; then
            curl --fail --show-error --silent \
              -X POST \
              -H "X-Trigger-Secret: $DAILY_REPORT_TRIGGER_SECRET" \
              "$DAILY_REPORT_URL"
          else
            curl --fail --show-error --silent \
              -X POST \
              "$DAILY_REPORT_URL"
          fi
